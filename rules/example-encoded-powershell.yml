# Detects encoded PowerShell execution against the ECS-normalized forge-windows-ecs
# index. rule_id must stay stable once created.
#
# Field contract: see SCHEMA.md. This rule queries ECS process.* fields, which
# exist in forge-windows-ecs* (proven via _field_caps). It intentionally does NOT
# query winlogbeat-*: that index carries no process.* (raw winlog.event_data.*
# only) and truncates CommandLine at ignore_above:256, which is exactly the P3
# bug that hid long -enc payloads.
rule_id: lab-win-encoded-powershell
name: "PowerShell EncodedCommand Execution"
description: >-
  Detects powershell.exe launched with an encoded command argument (-enc /
  -EncodedCommand) or an inline FromBase64String decode, a common
  defense-evasion pattern for staging obfuscated payloads. Matches on the
  analyzed process.command_line.text multi-field so long payloads are never
  truncated and matching is case-insensitive.
type: query
language: kuery
index:
  - "forge-windows-ecs*"
# Why .text and not the raw wildcard field:
#   - process.command_line is type `wildcard` (no length cap), so the payload is
#     stored in full -- but wildcard matching is CASE-SENSITIVE in KQL, so
#     `*-enc*` would miss `-EncodedCommand`.
#   - process.command_line.text (match_only_text) is analyzed + case-insensitive,
#     and "-enc" tokenizes to "enc", "-EncodedCommand" to "encodedcommand", so a
#     token match catches every case variant regardless of payload length.
# Gated on ECS event.category/event.type (process/start) rather than on
# event.action or winlog.task, whose text labels are unreliable (P2).
query: >-
  (event.category: "process" and event.type: "start") and
  (process.name: "powershell.exe" or process.name: "pwsh.exe" or
   process.pe.original_file_name: "PowerShell.EXE") and
  (process.command_line.text: "enc" or
   process.command_line.text: "encodedcommand" or
   process.command_line.text: "frombase64string")
risk_score: 47
severity: medium
enabled: true
interval: 5m
from: now-6m
# Sysmon isn't in eforge/attack.yaml's output.logs yet (SCHEMA.md / CHANGES.md
# Phase 0 claim #5), but adding it later would make a single encoded-PowerShell
# launch emit both a 4688 and a Sysmon EID 1 -- both normalizing to the same
# event.category/type/process.name/command_line, so this rule would fire
# twice on one attacker action. Suppress now, before that's possible, rather
# than reactively once it double-fires.
alert_suppression:
  group_by:
    - host.name
    - process.command_line
  duration:
    value: 5
    unit: m
  missing_fields_strategy: suppress
tags:
  - lab
  - windows
  - defense-evasion
